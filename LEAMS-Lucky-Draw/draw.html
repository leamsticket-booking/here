<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LEAMS Family Meet 2026 — Lucky Draw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --gold: #d4af37;
    --gold-bright: #f4d77b;
    --gold-deep: #8a6d1f;
    --gold-glow: rgba(212, 175, 55, 0.35);
    --text: #f5f1e8;
    --text-dim: #9a9489;
    --text-mute: #5c574e;
    --border: rgba(212, 175, 55, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { 
    background: var(--bg); color: var(--text); 
    font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.15), transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .container { position: relative; z-index: 1; text-align: center; width: 100%; max-width: 1200px; }
  .brand { font-family: 'Cormorant Garamond', serif; font-size: 2rem; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 1.5rem; font-style: italic; }
  
  .prize-banner { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; color: var(--gold-bright); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; display: inline-block; }

  /* Shuffler UI */
  #shuffler-screen { min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
  
  .shuffle-box { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; margin-bottom: 2rem; }
  .shuffle-grid { display: flex; gap: 4rem; justify-content: center; width: 100%; margin-bottom: 2rem; }
  .shuffle-col { flex: 1; display: flex; flex-direction: column; align-items: center; }

  .shuffle-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 6vw, 6rem); line-height: 1; margin-bottom: 1rem; background: linear-gradient(135deg, var(--text) 0%, var(--gold-bright) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; filter: blur(0px); transition: filter 0.1s; }
  .shuffle-name.blur { filter: blur(4px); opacity: 0.7; }
  .shuffle-ticket { font-family: 'JetBrains Mono', monospace; font-size: 1.2rem; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; }

  /* Winner UI */
  #winner-screen { display: none; animation: zoomIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; width: 100%; }
  .winner-title { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; letter-spacing: 0.4em; color: var(--gold-bright); text-transform: uppercase; margin-bottom: 3rem; }
  
  .winners-container { display: flex; justify-content: center; gap: 4rem; flex-wrap: wrap; margin-bottom: 2rem; }
  .winner-card { display: flex; flex-direction: column; align-items: center; animation: fadeUp 0.8s ease forwards; }

  .winner-photo-wrapper { margin: 0 auto 1.5rem; border: 2px solid var(--gold); padding: 10px; border-radius: 50%; position: relative; box-shadow: 0 0 60px var(--gold-glow); }
  .winner-photo-wrapper::before { content: ''; position: absolute; inset: -10px; border: 1px dashed var(--gold); border-radius: 50%; animation: spin 20s linear infinite; }
  .winner-photo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

  /* Grand Finale UI */
  #final-screen { display: none; animation: zoomIn 0.8s forwards; width: 100%; }
  .tier-label { font-family: 'JetBrains Mono', monospace; color: var(--gold-deep); letter-spacing: 0.3em; margin-bottom: 1.5rem; text-transform: uppercase; font-size: 0.9rem; }

  .btn-primary { padding: 1.2rem 3rem; background: linear-gradient(135deg, var(--gold-bright), var(--gold), var(--gold-deep)); color: var(--bg); border: none; font-family: 'JetBrains Mono', monospace; font-size: 1rem; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 600; cursor: pointer; box-shadow: 0 10px 40px -10px var(--gold-glow); transition: all 0.3s; margin-top: 1rem; }
  .btn-primary:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 20px 60px -10px var(--gold-glow); }
  .status-text { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-mute); margin-top: 2rem; letter-spacing: 0.1em; }

  @keyframes spin { 100% { transform: rotate(360deg); } }
  @keyframes zoomIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
  @keyframes fadeUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- EMBEDDED AUDIO ELEMENTS -->
<audio id="audio-drumroll" src="drumroll.mp3" preload="auto" loop></audio>
<audio id="audio-tada" src="tada.mp3" preload="auto"></audio>

<div class="container">
  <div class="brand" id="main-brand">LEAMS FAMILY MEET</div>
  <div class="prize-banner" id="prize-banner">1st Prize Draw</div>

  <!-- Screen 1: Shuffler -->
  <div id="shuffler-screen">
    
    <!-- Box for 1st Prize (1 Person) -->
    <div class="shuffle-box" id="shuffle-single">
      <div class="shuffle-name" id="display-name-1">Ready for Draw</div>
      <div class="shuffle-ticket" id="display-ticket-1">———</div>
    </div>

    <!-- Box for 2nd Prize (2 Persons) -->
    <div class="shuffle-grid" id="shuffle-double" style="display:none;">
      <div class="shuffle-col">
        <div class="shuffle-name" id="display-name-2a">Ready</div>
        <div class="shuffle-ticket" id="display-ticket-2a">———</div>
      </div>
      <div class="shuffle-col">
        <div class="shuffle-name" id="display-name-2b">Ready</div>
        <div class="shuffle-ticket" id="display-ticket-2b">———</div>
      </div>
    </div>

    <button class="btn-primary" id="start-btn" onclick="startDraw()">Commence Draw</button>
  </div>

  <!-- Screen 2: Individual Phase Winners -->
  <div id="winner-screen">
    <div class="winner-title" id="winner-title">✦ 1st Prize Winner ✦</div>
    
    <div class="winners-container" id="winners-container">
      <!-- Winner cards injected here -->
    </div>

    <!-- Navigation Buttons -->
    <button class="btn-primary" id="next-draw-btn" style="display:none;"></button>
  </div>

  <!-- Screen 3: The Grand Finale (All Winners + Message) -->
  <div id="final-screen">
    <div class="winner-title">✦ Grand Finale ✦</div>
    <div class="shuffle-name" style="font-size: clamp(2rem, 4vw, 3.5rem); color: var(--gold); margin-bottom: 3rem;">Congratulations to our Winners!</div>

    <!-- 1st Prize Row -->
    <div style="margin-bottom: 2rem;">
      <div class="tier-label">— 1st Prize —</div>
      <div id="final-tier-1" style="display: flex; justify-content: center;"></div>
    </div>

    <!-- 2nd Prize Row -->
    <div style="margin-bottom: 4rem;">
      <div class="tier-label">— 2nd Prize —</div>
      <div id="final-tier-2" style="display: flex; justify-content: center; gap: 4rem;"></div>
    </div>

    <!-- Farewell Message -->
    <div class="status-text" id="remaining-text" style="font-size: 1rem; color: var(--text-dim); padding-top: 2rem; border-top: 1px solid var(--border); max-width: 700px; margin: 0 auto; line-height: 1.6;">
      <!-- Populated by JS -->
    </div>
  </div>

  <div class="status-text" id="status-text">Connecting to registry...</div>
</div>

<script>
  // ═══════════════════════════════════════════════════════════
  // 🔐 SUPABASE CONFIGURATION (Paste your exact keys here!)
  // ═══════════════════════════════════════════════════════════
  const SUPABASE_URL = 'https://mysciycgzusrewdolqba.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15c2NpeWNnenVzcmV3ZG9scWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQ0MDIsImV4cCI6MjA5MzIwMDQwMn0.iAwY2CrcEirFCjI69sD-yauhZZ7vX4Jl1FO74ho8OXk';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let attendees = [];
  let shuffleInterval;
  let currentPhase = 1; // 1 = First Prize, 2 = Second Prize
  
  // Storage for the Final Screen
  let firstPrizeWinner = null;
  let secondPrizeWinners = [];

  // Audio Elements
  const soundDrumroll = document.getElementById('audio-drumroll');
  const soundTada = document.getElementById('audio-tada');

  // Fetch Attendees
  async function fetchAttendees() {
    try {
      const { data, error } = await db
        .from('registrations')
        .select('full_name, ticket_number, photo_url')
        .eq('checked_in', true);

      if (error) throw error;
      
      attendees = data;
      document.getElementById('status-text').textContent = `${attendees.length} verified attendees in the draw pool.`;
      
      if (attendees.length < 3) {
        document.getElementById('start-btn').textContent = 'Not Enough Attendees';
        document.getElementById('start-btn').disabled = true;
      }
    } catch (err) {
      console.error(err);
      document.getElementById('status-text').textContent = "Error connecting. (Using Demo Data)";
      // Fallback Data
      attendees = [
        { full_name: "Muhammed Razik", ticket_number: "LFM-2026-001", photo_url: "https://i.pravatar.cc/300?img=11" },
        { full_name: "Shavaf Shamsudheen", ticket_number: "LFM-2026-042", photo_url: "https://i.pravatar.cc/300?img=12" },
        { full_name: "Sayuj", ticket_number: "LFM-2026-089", photo_url: "https://i.pravatar.cc/300?img=13" },
        { full_name: "Jamnaz", ticket_number: "LFM-2026-105", photo_url: "https://i.pravatar.cc/300?img=14" },
        { full_name: "Sreekuttan O", ticket_number: "LFM-2026-112", photo_url: "https://i.pravatar.cc/300?img=15" }
      ];
    }
  }

  // Start Shuffling
  function startDraw() {
    if (currentPhase === 1 && attendees.length < 1) return;
    if (currentPhase === 2 && attendees.length < 2) return;

    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('status-text').style.opacity = '0';
    
    // Play Audio
    soundDrumroll.currentTime = 0;
    soundDrumroll.play().catch(e => console.log("Audio requires click first."));

    let speed = 50; 
    
    if (currentPhase === 1) {
      const nameEl = document.getElementById('display-name-1');
      const ticketEl = document.getElementById('display-ticket-1');
      nameEl.classList.add('blur');
      
      shuffleInterval = setInterval(() => {
        const p = attendees[Math.floor(Math.random() * attendees.length)];
        nameEl.textContent = p.full_name.toUpperCase();
        ticketEl.textContent = p.ticket_number;
      }, speed);

    } else if (currentPhase === 2) {
      const nameElA = document.getElementById('display-name-2a');
      const ticketElA = document.getElementById('display-ticket-2a');
      const nameElB = document.getElementById('display-name-2b');
      const ticketElB = document.getElementById('display-ticket-2b');
      
      nameElA.classList.add('blur'); nameElB.classList.add('blur');
      
      shuffleInterval = setInterval(() => {
        const p1 = attendees[Math.floor(Math.random() * attendees.length)];
        const p2 = attendees[Math.floor(Math.random() * attendees.length)];
        nameElA.textContent = p1.full_name.toUpperCase(); ticketElA.textContent = p1.ticket_number;
        nameElB.textContent = p2.full_name.toUpperCase(); ticketElB.textContent = p2.ticket_number;
      }, speed);
    }

    setTimeout(revealWinner, 6000);
  }

  // Generate Winner Card HTML
  // isMini shrinks the card slightly so 2nd prize fits nicely next to each other
  function createWinnerCard(winnerData, isMini = false) {
    const photo = winnerData.photo_url || 'https://via.placeholder.com/250/0a0a0a/d4af37?text=LEAMS';
    const photoSize = isMini ? '160px' : '230px';
    const nameSize = isMini ? '1.8rem' : '2.5rem';

    return `
      <div class="winner-card">
        <div class="winner-photo-wrapper" style="width: ${photoSize}; height: ${photoSize};">
          <img class="winner-photo" src="${photo}" alt="Winner">
        </div>
        <div class="shuffle-name" style="color: var(--gold-bright); font-size: ${nameSize}; filter: blur(0); margin-bottom: 0.5rem;">${winnerData.full_name}</div>
        <div class="shuffle-ticket" style="color: var(--text); font-size: 1rem;">${winnerData.ticket_number}</div>
      </div>
    `;
  }

  // Extract a winner from the array so they cannot win again
  function pullRandomWinner() {
    const index = Math.floor(Math.random() * attendees.length);
    return attendees.splice(index, 1)[0]; 
  }

  // Reveal Phase Winners
  function revealWinner() {
    clearInterval(shuffleInterval);
    
    // Stop Drumroll, Play Tada
    soundDrumroll.pause();
    soundTada.currentTime = 0; 
    soundTada.play().catch(e => console.log("Audio requires click first."));

    const container = document.getElementById('winners-container');
    const nextBtn = document.getElementById('next-draw-btn');

    if (currentPhase === 1) {
      // 1st Prize Logic
      firstPrizeWinner = pullRandomWinner();
      document.getElementById('winner-title').textContent = "✦ 1st Prize Winner ✦";
      container.innerHTML = createWinnerCard(firstPrizeWinner);
      
      nextBtn.textContent = "Proceed to 2nd Prize Draw →";
      nextBtn.onclick = prepareSecondDraw;
      nextBtn.style.display = 'inline-block';

    } else if (currentPhase === 2) {
      // 2nd Prize Logic
      secondPrizeWinners = [pullRandomWinner(), pullRandomWinner()];
      document.getElementById('winner-title').textContent = "✦ 2nd Prize Winners ✦";
      
      // Render as mini cards to fit side-by-side perfectly
      container.innerHTML = createWinnerCard(secondPrizeWinners[0], true) + createWinnerCard(secondPrizeWinners[1], true);
      
      nextBtn.textContent = "View Grand Finale →";
      nextBtn.onclick = showFinalScreen;
      nextBtn.style.display = 'inline-block';
    }

    document.getElementById('shuffler-screen').style.display = 'none';
    document.getElementById('winner-screen').style.display = 'block';
  }

  // Transition UI from 1st to 2nd Draw
  function prepareSecondDraw() {
    currentPhase = 2;
    document.getElementById('prize-banner').textContent = "2nd Prize Draw";
    document.getElementById('winner-screen').style.display = 'none';
    document.getElementById('shuffler-screen').style.display = 'flex';
    document.getElementById('shuffle-single').style.display = 'none';
    document.getElementById('shuffle-double').style.display = 'flex';
    
    const startBtn = document.getElementById('start-btn');
    startBtn.textContent = "Draw 2nd Prize";
    startBtn.style.display = 'inline-block';
  }

  // Show the Grand Finale Screen
  function showFinalScreen() {
    // Hide previous screens
    document.getElementById('winner-screen').style.display = 'none';
    document.getElementById('prize-banner').style.display = 'none';
    
    // Play triumphant sound again
    soundTada.currentTime = 0;
    soundTada.play().catch(e => {});

    // Populate Finale UI
    document.getElementById('final-tier-1').innerHTML = createWinnerCard(firstPrizeWinner);
    document.getElementById('final-tier-2').innerHTML = createWinnerCard(secondPrizeWinners[0], true) + createWinnerCard(secondPrizeWinners[1], true);

    // Calculate remaining attendees message
    const remainingCount = attendees.length;
    let message = "";
    if (remainingCount > 0) {
      message = `A big thank you to the remaining <strong style="color:var(--gold);">${remainingCount}</strong> members of the LEAMS family who participated tonight. <br>Better luck next time, and enjoy the rest of the evening!`;
    } else {
      message = "Thank you to the entire LEAMS family for an unforgettable evening!";
    }
    document.getElementById('remaining-text').innerHTML = message;

    // Display Finale Screen
    document.getElementById('final-screen').style.display = 'block';
  }

  fetchAttendees();
</script>
</body>
</html>
