<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LEAMS Family Meet 2026 — Lucky Draw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0a;
    --gold: #d4af37;
    --gold-bright: #f4d77b;
    --gold-deep: #8a6d1f;
    --gold-glow: rgba(212, 175, 55, 0.35);
    --text: #f5f1e8;
    --text-dim: #9a9489;
    --text-mute: #5c574e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { 
    background: var(--bg); color: var(--text); 
    font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.15), transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .container { position: relative; z-index: 1; text-align: center; width: 100%; max-width: 1000px; padding: 2rem; }
  .brand { font-family: 'Cormorant Garamond', serif; font-size: 2rem; letter-spacing: 0.2em; color: var(--gold); margin-bottom: 3rem; font-style: italic; }

  #shuffler-screen { min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .shuffle-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(4rem, 8vw, 7rem); line-height: 1; margin-bottom: 1rem; background: linear-gradient(135deg, var(--text) 0%, var(--gold-bright) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; filter: blur(0px); transition: filter 0.1s; }
  .shuffle-name.blur { filter: blur(4px); opacity: 0.7; }
  .shuffle-ticket { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; }

  #winner-screen { display: none; animation: zoomIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
  .winner-photo-wrapper { width: 250px; height: 250px; margin: 0 auto 2rem; border: 2px solid var(--gold); padding: 10px; border-radius: 50%; position: relative; box-shadow: 0 0 80px var(--gold-glow); }
  .winner-photo-wrapper::before { content: ''; position: absolute; inset: -10px; border: 1px dashed var(--gold); border-radius: 50%; animation: spin 20s linear infinite; }
  .winner-photo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
  .winner-title { font-family: 'JetBrains Mono', monospace; font-size: 1rem; letter-spacing: 0.4em; color: var(--gold-bright); text-transform: uppercase; margin-bottom: 1rem; }

  .btn-primary { padding: 1.2rem 3rem; margin-top: 4rem; background: linear-gradient(135deg, var(--gold-bright), var(--gold), var(--gold-deep)); color: var(--bg); border: none; font-family: 'JetBrains Mono', monospace; font-size: 1rem; letter-spacing: 0.25em; text-transform: uppercase; font-weight: 600; cursor: pointer; box-shadow: 0 10px 40px -10px var(--gold-glow); transition: all 0.3s; }
  .btn-primary:hover { transform: translateY(-2px) scale(1.05); box-shadow: 0 20px 60px -10px var(--gold-glow); }
  .status-text { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--text-mute); margin-top: 2rem; letter-spacing: 0.1em; }

  @keyframes spin { 100% { transform: rotate(360deg); } }
  @keyframes zoomIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>

<!-- EMBEDDED AUDIO ELEMENTS -->
<audio id="audio-drumroll" src="drumroll.mp3" preload="auto" loop></audio>
<audio id="audio-tada" src="tada.mp3" preload="auto"></audio>

<div class="container">
  <div class="brand">LEAMS FAMILY MEET</div>

  <div id="shuffler-screen">
    <div class="shuffle-name" id="display-name">Ready for Draw</div>
    <div class="shuffle-ticket" id="display-ticket">———</div>
    <button class="btn-primary" id="start-btn" onclick="startDraw()">Commence Draw</button>
  </div>

  <div id="winner-screen">
    <div class="winner-title">✦ Tonight's Lucky Winner ✦</div>
    <div class="winner-photo-wrapper">
      <img id="winner-photo" class="winner-photo" src="" alt="Winner">
    </div>
    <div class="shuffle-name" id="winner-name" style="color: var(--gold-bright);">Name</div>
    <div class="shuffle-ticket" id="winner-ticket" style="color: var(--text);">Ticket #</div>
  </div>

  <div class="status-text" id="status-text">Connecting to registry...</div>
</div>

<script>
  // ═══════════════════════════════════════════════════════════
  // 🔐 SUPABASE CONFIGURATION (Paste your keys back here!)
  // ═══════════════════════════════════════════════════════════
  const SUPABASE_URL = 'https://mysciycgzusrewdolqba.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15c2NpeWNnenVzcmV3ZG9scWJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MjQ0MDIsImV4cCI6MjA5MzIwMDQwMn0.iAwY2CrcEirFCjI69sD-yauhZZ7vX4Jl1FO74ho8OXk';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let attendees = [];
  let shuffleInterval;
  
  // Link to HTML Audio Elements
  const soundDrumroll = document.getElementById('audio-drumroll');
  const soundTada = document.getElementById('audio-tada');

  // Fetch Checked-in Attendees
  async function fetchAttendees() {
    try {
      const { data, error } = await db
        .from('registrations')
        .select('full_name, ticket_number, photo_url')
        .eq('checked_in', true);

      if (error) throw error;
      
      attendees = data;
      document.getElementById('status-text').textContent = `${attendees.length} verified attendees in the draw pool.`;
      
      if (attendees.length === 0) {
        document.getElementById('start-btn').textContent = 'No Attendees Checked In';
        document.getElementById('start-btn').disabled = true;
      }
    } catch (err) {
      console.error(err);
      document.getElementById('status-text').textContent = "Error connecting. (Using Demo Data)";
      attendees = [
        { full_name: "Muhammed Razik", ticket_number: "LFM-2026-001", photo_url: "https://i.pravatar.cc/300?img=11" },
        { full_name: "Shavaf Shamsudheen", ticket_number: "LFM-2026-042", photo_url: "https://i.pravatar.cc/300?img=12" },
        { full_name: "Sayuj", ticket_number: "LFM-2026-089", photo_url: "https://i.pravatar.cc/300?img=13" },
        { full_name: "Jamnaz", ticket_number: "LFM-2026-105", photo_url: "https://i.pravatar.cc/300?img=14" }
      ];
    }
  }

  // Start the Draw
  function startDraw() {
    if (attendees.length === 0) return;

    document.getElementById('start-btn').style.display = 'none';
    document.getElementById('status-text').style.opacity = '0';
    
    // 🎵 FORCE PLAY DRUMROLL
    soundDrumroll.currentTime = 0;
    soundDrumroll.play();

    const nameDisplay = document.getElementById('display-name');
    const ticketDisplay = document.getElementById('display-ticket');
    
    nameDisplay.classList.add('blur');
    let speed = 50; 
    
    shuffleInterval = setInterval(() => {
      const randomPerson = attendees[Math.floor(Math.random() * attendees.length)];
      nameDisplay.textContent = randomPerson.full_name.toUpperCase();
      ticketDisplay.textContent = randomPerson.ticket_number;
    }, speed);

    setTimeout(revealWinner, 6000);
  }

  // Reveal the Winner
  function revealWinner() {
    clearInterval(shuffleInterval);
    
    // 🎵 STOP DRUMROLL, PLAY TADA
    soundDrumroll.pause();
    soundTada.currentTime = 0; 
    soundTada.play();

    const winner = attendees[Math.floor(Math.random() * attendees.length)];

    document.getElementById('shuffler-screen').style.display = 'none';
    document.getElementById('winner-screen').style.display = 'block';

    document.getElementById('winner-photo').src = winner.photo_url || 'https://via.placeholder.com/250/0a0a0a/d4af37?text=LEAMS';
    document.getElementById('winner-name').textContent = winner.full_name;
    document.getElementById('winner-ticket').textContent = winner.ticket_number;
  }

  fetchAttendees();
</script>
</body>
</html>
